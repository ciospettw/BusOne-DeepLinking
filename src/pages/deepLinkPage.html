<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{PAGE_TITLE}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0a0a;
        --card: #111113;
        --border: #24242b;
        --muted: #a1a1aa;
        --fg: #fafafa;
        --primary: #28e28b;
        --primary-dim: rgba(40, 226, 139, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background:
          radial-gradient(1100px 520px at 110% -10%, rgba(40, 226, 139, 0.14), transparent 55%),
          radial-gradient(900px 420px at -10% 120%, rgba(40, 226, 139, 0.08), transparent 55%),
          var(--bg);
        color: var(--fg);
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
      }

      .sheet {
        width: 100%;
        max-width: 560px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, #15151a 0%, var(--card) 100%);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        overflow: hidden;
      }

      .handle {
        height: 28px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .handle-bar {
        width: 34px;
        height: 3px;
        background: #5a5a66;
      }

      .content {
        padding: 18px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .badge {
        min-width: 80px;
        height: 46px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--primary);
        color: #04150e;
        font-family: 'Space Mono', ui-monospace, Menlo, monospace;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.04em;
      }

      .meta {
        margin-top: 2px;
        color: var(--muted);
        font-family: 'Space Mono', ui-monospace, Menlo, monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 8px;
        font-size: 24px;
        line-height: 1.15;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        color: #d4d4d8;
        line-height: 1.45;
      }

      .trip {
        margin-top: 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--border);
        background: #17171d;
        padding: 8px 10px;
        font-family: 'Space Mono', ui-monospace, Menlo, monospace;
        font-size: 13px;
      }

      .trip-dot {
        width: 6px;
        height: 6px;
        background: var(--primary);
      }

      .actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        text-decoration: none;
        padding: 12px 14px;
        border-radius: 0;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.01em;
        border: 1px solid transparent;
      }

      .btn-primary {
        background: var(--primary-dim);
        border-color: rgba(40, 226, 139, 0.36);
        color: var(--primary);
      }

      .btn-secondary {
        background: #202028;
        border-color: #3a3a46;
        color: var(--fg);
      }

      .hint {
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="sheet">
        <div class="handle">
          <div class="handle-bar"></div>
        </div>
        <div class="content">
          <div class="row">
            <div class="badge">{{BADGE}}</div>
            <div class="meta">{{META}}</div>
          </div>

          <h1>{{HEADING}}</h1>
          <p>{{DESCRIPTION}}</p>

          <div class="trip">
            <div class="trip-dot"></div>
            <span>{{ITEM_LABEL}}</span>
          </div>

          <div class="actions">
            <a class="btn btn-primary" href="{{APP_LINK}}">Apri app</a>
            <a class="btn btn-secondary" href="{{HTTPS_LINK}}">Ricarica link</a>
          </div>

          <p class="hint">Se non si apre automaticamente, tocca “Apri app”. Alcuni browser non aprono l'app quando l'URL viene digitato manualmente nella barra indirizzi.</p>
        </div>
      </div>
    </div>
    <script>
      setTimeout(function () {
        window.location.href = '{{APP_LINK}}';
      }, 120);
    </script>
  </body>
</html>
