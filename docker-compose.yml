services:
  deeplinking:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: busone-deeplinking
    restart: unless-stopped
    environment:
      PORT: "7462"
      APPLE_TEAM_ID: "HPQ583U5HP"
      IOS_BUNDLE_ID: "com.busone.app"
      IOS_PATHS: "/*"
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX: "20"
    ports:
      - "7462:7462"
